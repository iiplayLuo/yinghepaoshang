<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>春秋战国地图编辑器</title>
    <style>
        body {
            font-family: "Microsoft YaHei", "SimSun", serif;
            background-color: #f5f0e6;
            margin: 20px;
            color: #333;
        }
        h1 {
            text-align: center;
            color: #8b4513;
            border-bottom: 2px solid #8b4513;
            padding-bottom: 10px;
        }
        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .map-section {
            flex: 2;
            min-width: 600px;
        }
        .editor-section {
            flex: 1;
            min-width: 300px;
            background-color: #fff;
            padding: 20px;
            border: 1px solid #8b4513;
            border-radius: 5px;
        }
        .map {
            display: grid;
            grid-template-columns: repeat(100, 20px);
            grid-template-rows: repeat(100, 20px);
            gap: 1px;
            background-color: #ddd;
            border: 2px solid #8b4513;
            margin: 20px 0;
            overflow: auto;
            max-height: 950px;
            max-width: 100%;
        }
        .map-section {
            flex: 2;
            min-width: 600px;
        }
        .cell {
            width: 20px;
            height: 20px;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            position: relative;
        }
        .cell:hover {
            background-color: #ffebcd;
        }
        .cell.city {
            background-color: #ffe4b5;
            color: #8b4513;
        }
        .cell.city.large {
            background-color: #ff6347;
            color: white;
        }
        .cell.city.medium {
            background-color: #ffa500;
            color: white;
        }
        .cell.city.small {
            background-color: #ffd700;
            color: #8b4513;
        }
        .cell.birth {
            background-color: #000000;
            color: white;
        }
        .editor-section h3 {
            color: #8b4513;
            margin-top: 0;
        }
        .form-group {
            margin: 15px 0;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input[type="checkbox"] {
            margin-right: 5px;
        }
        .buildings-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 5px;
        }
        .buildings-list label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: normal;
            margin: 0;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button.primary {
            background-color: #8b4513;
            color: white;
        }
        button.primary:hover {
            background-color: #a0522d;
        }
        button.secondary {
            background-color: #ddd;
            color: #333;
        }
        button.secondary:hover {
            background-color: #ccc;
        }
        .info {
            background-color: #e8f4f8;
            padding: 10px;
            border-left: 4px solid #3498db;
            margin: 10px 0;
        }
        .legend {
            margin: 20px 0;
            padding: 15px;
            background-color: #fff;
            border: 1px solid #8b4513;
            border-radius: 5px;
        }
        .legend h4 {
            margin-top: 0;
            color: #8b4513;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin: 5px 0;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            border: 1px solid #ddd;
        }
        .actions {
            margin: 20px 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>🗺️ 春秋战国地图编辑器</h1>

    <div class="info">
        <strong>操作说明：</strong><br>
        1. 点击网格上的单元格来创建或选择城市<br>
        2. 在右侧编辑城市属性<br>
        3. 点击"保存城市"按钮保存修改<br>
        4. 点击"清除城市"按钮删除城市<br>
        5. 最后点击"导出地图数据"保存所有城市数据
    </div>

    <div class="container">
        <div class="map-section">
            <h3>地图编辑区</h3>
            <div class="map" id="map"></div>
            
            <div class="legend">
                <h4>图例</h4>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #000000;"></div>
                    <span>主角出生点</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #ff6347;"></div>
                    <span>大型城市</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #ffa500;"></div>
                    <span>中型城市</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #ffd700;"></div>
                    <span>小型城市</span>
                </div>
            </div>

            <div class="actions">
                <button class="primary" onclick="exportData()">导出地图数据</button>
                <button class="secondary" onclick="loadData()">加载数据</button>
                <button class="secondary" onclick="clearAll()">清空地图</button>
            </div>
        </div>

        <div class="editor-section">
            <h3>城市属性编辑</h3>
            <form id="cityForm">
                <div class="form-group">
                    <label for="cityId">城市ID：</label>
                    <input type="number" id="cityId" min="1" value="1">
                </div>
                <div class="form-group">
                    <label for="cityName">城市名字：</label>
                    <input type="text" id="cityName" value="咸阳" placeholder="请输入城市名称">
                </div>
                <div class="form-group">
                    <label for="citySize">城市规模：</label>
                    <select id="citySize">
                        <option value="large">大</option>
                        <option value="medium">中</option>
                        <option value="small">小</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="isBirth" checked>
                        是主角默认出生点
                    </label>
                </div>
                <div class="form-group">
                    <label>建筑物：</label>
                    <div class="buildings-list">
                        <label><input type="checkbox" id="building-palace"> 行宫</label>
                        <label><input type="checkbox" id="building-blacksmith"> 铁铺</label>
                        <label><input type="checkbox" id="building-market"> 市集</label>
                        <label><input type="checkbox" id="building-tavern"> 酒馆</label>
                        <label><input type="checkbox" id="building-stable"> 马厮</label>
                        <label><input type="checkbox" id="building-inn"> 民宿</label>
                        <label><input type="checkbox" id="building-post"> 驿站</label>
                    </div>
                </div>
                <div class="button-group">
                    <button type="button" class="primary" onclick="saveCity()">保存城市</button>
                    <button type="button" class="secondary" onclick="clearCity()">清除城市</button>
                </div>
            </form>
            <div id="status" style="margin-top: 15px; color: #8b4513;"></div>
        </div>
    </div>

    <script>
        // 地图数据
        let mapData = [];
        let selectedCell = null;
        let nextId = 1;

        // 地图格子与里之间的转换
        // 咸阳(0,0)在地图中心(50,50)，1格子=50里
        function liToGrid(liX, liY) {
            return {
                x: Math.round((liX / 50) + 50),
                y: Math.round(50 - (liY / 50))
            };
        }
        
        function gridToLi(gridX, gridY) {
            return {
                x: (gridX - 50) * 50,
                y: (50 - gridY) * 50
            };
        }

        // 初始化地图
        function initMap() {
            const mapEl = document.getElementById('map');
            mapEl.innerHTML = '';

            for (let y = 99; y >= 0; y--) { // 从顶部开始（Y轴反转）
                for (let x = 0; x < 100; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.x = x;
                    cell.dataset.y = y;

                    // 检查是否有城市（将格子坐标转换为里坐标进行比较）
                    const liCoords = gridToLi(x, y);
                    const city = mapData.find(c => c.x === liCoords.x && c.y === liCoords.y);
                    if (city) {
                        cell.classList.add('city');
                        cell.classList.add(city.size);
                        if (city.isBirth) {
                            cell.classList.add('birth');
                        }
                        cell.textContent = city.name.charAt(0);
                        cell.title = `${city.name} (${city.x}, ${city.y})里`;
                    }

                    cell.onclick = () => selectCell(cell);
                    mapEl.appendChild(cell);
                }
            }
        }

        // 选择单元格
        function selectCell(cell) {
            selectedCell = cell;
            const gridX = parseInt(cell.dataset.x);
            const gridY = parseInt(cell.dataset.y);
            const liCoords = gridToLi(gridX, gridY);

            // 检查是否有城市
            const city = mapData.find(c => c.x === liCoords.x && c.y === liCoords.y);
            if (city) {
                document.getElementById('cityId').value = city.id;
                document.getElementById('cityName').value = city.name;
                document.getElementById('citySize').value = city.size;
                document.getElementById('isBirth').checked = city.isBirth;
                
                // 设置建筑物
                setBuildingsByCitySize(city.size, city.buildings);
            } else {
                // 新城市
                document.getElementById('cityId').value = nextId;
                document.getElementById('cityName').value = '新城市';
                document.getElementById('citySize').value = 'medium';
                document.getElementById('isBirth').checked = false;
                
                // 设置默认建筑物
                setBuildingsByCitySize('medium');
            }

            document.getElementById('status').textContent = `已选择位置: (${liCoords.x}, ${liCoords.y})里`;
        }
        
        // 根据城市大小设置建筑物
        function setBuildingsByCitySize(size, existingBuildings = null) {
            // 大城市：所有建筑物
            if (size === 'large') {
                document.getElementById('building-palace').checked = existingBuildings ? existingBuildings.palace : true;
                document.getElementById('building-blacksmith').checked = existingBuildings ? existingBuildings.blacksmith : true;
                document.getElementById('building-market').checked = existingBuildings ? existingBuildings.market : true;
                document.getElementById('building-tavern').checked = existingBuildings ? existingBuildings.tavern : true;
                document.getElementById('building-stable').checked = existingBuildings ? existingBuildings.stable : true;
                document.getElementById('building-inn').checked = existingBuildings ? existingBuildings.inn : true;
                document.getElementById('building-post').checked = existingBuildings ? existingBuildings.post : true;
            }
            // 中型城市：没有行宫，马厮
            else if (size === 'medium') {
                document.getElementById('building-palace').checked = existingBuildings ? existingBuildings.palace : false;
                document.getElementById('building-blacksmith').checked = existingBuildings ? existingBuildings.blacksmith : true;
                document.getElementById('building-market').checked = existingBuildings ? existingBuildings.market : true;
                document.getElementById('building-tavern').checked = existingBuildings ? existingBuildings.tavern : true;
                document.getElementById('building-stable').checked = existingBuildings ? existingBuildings.stable : false;
                document.getElementById('building-inn').checked = existingBuildings ? existingBuildings.inn : true;
                document.getElementById('building-post').checked = existingBuildings ? existingBuildings.post : true;
            }
            // 小型城市：只有市集，民宿，酒馆和驿站
            else if (size === 'small') {
                document.getElementById('building-palace').checked = existingBuildings ? existingBuildings.palace : false;
                document.getElementById('building-blacksmith').checked = existingBuildings ? existingBuildings.blacksmith : false;
                document.getElementById('building-market').checked = existingBuildings ? existingBuildings.market : true;
                document.getElementById('building-tavern').checked = existingBuildings ? existingBuildings.tavern : true;
                document.getElementById('building-stable').checked = existingBuildings ? existingBuildings.stable : false;
                document.getElementById('building-inn').checked = existingBuildings ? existingBuildings.inn : true;
                document.getElementById('building-post').checked = existingBuildings ? existingBuildings.post : true;
            }
        }

        // 保存城市
        function saveCity() {
            if (!selectedCell) {
                alert('请先选择一个位置');
                return;
            }

            const gridX = parseInt(selectedCell.dataset.x);
            const gridY = parseInt(selectedCell.dataset.y);
            const liCoords = gridToLi(gridX, gridY);
            const id = parseInt(document.getElementById('cityId').value);
            const name = document.getElementById('cityName').value;
            const size = document.getElementById('citySize').value;
            const isBirth = document.getElementById('isBirth').checked;
            
            // 获取建筑物设置
            const buildings = {
                palace: document.getElementById('building-palace').checked,
                blacksmith: document.getElementById('building-blacksmith').checked,
                market: document.getElementById('building-market').checked,
                tavern: document.getElementById('building-tavern').checked,
                stable: document.getElementById('building-stable').checked,
                inn: document.getElementById('building-inn').checked,
                post: document.getElementById('building-post').checked
            };

            if (!name) {
                alert('请输入城市名称');
                return;
            }

            // 检查是否已存在
            const existingIndex = mapData.findIndex(c => c.x === liCoords.x && c.y === liCoords.y);
            if (existingIndex >= 0) {
                mapData[existingIndex] = { id, name, x: liCoords.x, y: liCoords.y, size, isBirth, buildings };
            } else {
                mapData.push({ id, name, x: liCoords.x, y: liCoords.y, size, isBirth, buildings });
            }

            // 更新下一个ID
            nextId = Math.max(...mapData.map(c => c.id), 0) + 1;

            // 确保只有一个出生点
            if (isBirth) {
                mapData.forEach(city => {
                    if (city.x !== liCoords.x || city.y !== liCoords.y) {
                        city.isBirth = false;
                    }
                });
            }

            initMap();
            document.getElementById('status').textContent = `城市 ${name} 保存成功！`;
        }

        // 清除城市
        function clearCity() {
            if (!selectedCell) {
                alert('请先选择一个位置');
                return;
            }

            const gridX = parseInt(selectedCell.dataset.x);
            const gridY = parseInt(selectedCell.dataset.y);
            const liCoords = gridToLi(gridX, gridY);

            mapData = mapData.filter(c => c.x !== liCoords.x || c.y !== liCoords.y);
            initMap();
            document.getElementById('status').textContent = '城市已清除';
        }

        // 导出数据
        function exportData() {
            // 转换为游戏需要的格式
            const exportData = mapData.map(city => ({
                name: city.name,
                x: city.x,
                y: city.y,
                country: '秦', // 默认国家，可根据需要修改
                size: city.size === 'large' ? '大型' : city.size === 'medium' ? '中型' : '小型',
                speciality: '铁器', // 默认特产，可根据需要修改
                friendliness: 50 // 默认友好度，可根据需要修改
            }));

            const dataStr = JSON.stringify(exportData, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'cities.json';
            link.click();
            URL.revokeObjectURL(url);

            document.getElementById('status').textContent = '地图数据已导出';
        }

        // 加载数据
        function loadData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        try {
                            const data = JSON.parse(e.target.result);
                            mapData = data.map(city => ({
                                id: city.id || nextId++,
                                name: city.name,
                                x: city.x,
                                y: city.y,
                                size: city.size === '大型' ? 'large' : city.size === '中型' ? 'medium' : 'small',
                                isBirth: city.name === '咸阳' // 默认咸阳为出生点
                            }));
                            nextId = Math.max(...mapData.map(c => c.id), 0) + 1;
                            initMap();
                            document.getElementById('status').textContent = '地图数据已加载';
                        } catch (error) {
                            alert('数据格式错误');
                        }
                    };
                    reader.readAsText(file);
                }
            };
            input.click();
        }

        // 清空地图
        function clearAll() {
            if (confirm('确定要清空所有城市吗？')) {
                mapData = [];
                nextId = 1;
                initMap();
                document.getElementById('status').textContent = '地图已清空';
            }
        }

        // 生成春秋战国城市数据
        function generateCities() {
            // 春秋战国时期主要城市列表（坐标以咸阳为原点(0,0)，单位：里）
            // 1个格子 = 50里 = 25公里
            const cities = [
                // 秦国城市
                { name: '咸阳', x: 0, y: 0, size: 'large', isBirth: true },
                { name: '雍城', x: -100, y: 100, size: 'large' },
                { name: '栎阳', x: 100, y: 50, size: 'medium' },
                { name: '陇西', x: -250, y: -100, size: 'small' },
                { name: '北地', x: -150, y: -250, size: 'small' },
                
                // 晋国/三晋城市
                { name: '晋阳', x: 1000, y: 250, size: 'large' },
                { name: '平阳', x: 900, y: 400, size: 'medium' },
                { name: '绛城', x: 750, y: 500, size: 'large' },
                { name: '邯郸', x: 1250, y: 500, size: 'large' },
                { name: '大梁', x: 1100, y: 750, size: 'large' },
                { name: '安邑', x: 800, y: 600, size: 'medium' },
                { name: '新郑', x: 1000, y: 900, size: 'large' },
                { name: '上党', x: 900, y: 300, size: 'medium' },
                
                // 齐国城市
                { name: '临淄', x: 1750, y: -250, size: 'large' },
                { name: '即墨', x: 2000, y: -400, size: 'medium' },
                { name: '莒城', x: 1900, y: 400, size: 'medium' },
                { name: '历城', x: 1600, y: 400, size: 'small' },
                
                // 楚国城市
                { name: '郢都', x: 1250, y: 1750, size: 'large' },
                { name: '寿春', x: 1500, y: 1500, size: 'large' },
                { name: '宛城', x: 1100, y: 1250, size: 'medium' },
                { name: '陈城', x: 1250, y: 1100, size: 'medium' },
                { name: '鄂城', x: 1750, y: 1900, size: 'small' },
                { name: '长沙', x: 1500, y: 2250, size: 'small' },
                { name: '江陵', x: 1100, y: 1900, size: 'medium' },
                
                // 燕国城市
                { name: '蓟城', x: 2250, y: 0, size: 'large' },
                { name: '涿城', x: 2000, y: 250, size: 'medium' },
                { name: '易城', x: 1900, y: -100, size: 'small' },
                
                // 宋国城市
                { name: '商丘', x: 1400, y: 900, size: 'large' },
                { name: '彭城', x: 1600, y: 1000, size: 'medium' },
                
                // 鲁国城市
                { name: '曲阜', x: 1750, y: 600, size: 'large' },
                { name: '邹城', x: 1650, y: 700, size: 'small' },
                
                // 卫国城市
                { name: '朝歌', x: 1250, y: 600, size: 'medium' },
                { name: '濮阳', x: 1350, y: 700, size: 'medium' },
                
                // 郑国城市
                { name: '荥阳', x: 1100, y: 800, size: 'small' },
                
                // 吴国城市
                { name: '姑苏', x: 2000, y: 1250, size: 'large' },
                { name: '会稽', x: 2250, y: 1500, size: 'medium' },
                
                // 其他重要城市
                { name: '洛阳', x: 1000, y: 750, size: 'large' },
                { name: '周王城', x: 950, y: 700, size: 'medium' },
                { name: '函谷关', x: 250, y: 400, size: 'small' },
                { name: '武关', x: 400, y: 750, size: 'small' },
                { name: '潼关', x: 100, y: 250, size: 'small' },
                { name: '大荔', x: 250, y: 100, size: 'small' },
                { name: '临晋', x: 400, y: 0, size: 'small' },
                { name: '蒲坂', x: 500, y: 100, size: 'small' },
                { name: '解梁', x: 600, y: 250, size: 'small' },
                { name: '曲沃', x: 700, y: 400, size: 'small' },
                { name: '翼城', x: 800, y: 450, size: 'small' },
                { name: '皮氏', x: 600, y: 400, size: 'small' },
                { name: '平阳', x: 900, y: 400, size: 'medium' },
                { name: '屯留', x: 800, y: 300, size: 'small' },
                { name: '长子', x: 850, y: 350, size: 'small' },
                { name: '铜鞮', x: 750, y: 350, size: 'small' },
                { name: '襄垣', x: 950, y: 300, size: 'small' },
                { name: '武安', x: 1300, y: 400, size: 'small' },
                { name: '邺城', x: 1200, y: 550, size: 'medium' },
                { name: '信都', x: 1350, y: 600, size: 'small' },
                { name: '中山', x: 1100, y: 400, size: 'medium' }
            ];

            // 确保城市数量为60个
            while (cities.length < 60) {
                // 随机生成一些额外的城市
                const randomCities = [
                    '蓝田', '商於', '汉中', '巴郡', '蜀郡', '南郑', '云阳', '高奴',
                    '上郡', '九原', '云中', '雁门', '代郡', '上谷', '渔阳', '右北平',
                    '辽西', '辽东', '临淄', '即墨', '莒城', '历城', '薛城', '滕城',
                    '曲阜', '邹城', '陶丘', '定陶', '濮阳', '朝歌', '帝丘', '顿丘',
                    '大梁', '荥阳', '陈留', '雍丘', '睢阳', '彭城', '下邳', '淮阴',
                    '寿春', '钟离', '舒城', '六城', '潜城', '庐江', '九江', '豫章',
                    '长沙', '武陵', '零陵', '桂阳', '苍梧', '南海', '番禺', '桂林'
                ];
                
                const randomName = randomCities[Math.floor(Math.random() * randomCities.length)];
                // 坐标范围：-10000到10000里（1万=50格子）
                const randomX = Math.floor(Math.random() * 20001) - 10000;
                const randomY = Math.floor(Math.random() * 20001) - 10000;
                const randomSize = ['small', 'medium', 'large'][Math.floor(Math.random() * 3)];
                
                // 根据城市大小设置建筑物
                let buildings = {};
                if (randomSize === 'large') {
                    buildings = {
                        palace: true,
                        blacksmith: true,
                        market: true,
                        tavern: true,
                        stable: true,
                        inn: true,
                        post: true
                    };
                } else if (randomSize === 'medium') {
                    buildings = {
                        palace: false,
                        blacksmith: true,
                        market: true,
                        tavern: true,
                        stable: false,
                        inn: true,
                        post: true
                    };
                } else if (randomSize === 'small') {
                    buildings = {
                        palace: false,
                        blacksmith: false,
                        market: true,
                        tavern: true,
                        stable: false,
                        inn: true,
                        post: true
                    };
                }
                
                // 检查是否已存在相同位置的城市
                const exists = cities.some(city => city.x === randomX && city.y === randomY);
                if (!exists) {
                    cities.push({ name: randomName, x: randomX, y: randomY, size: randomSize, isBirth: false, buildings });
                }
            }

            // 为每个城市分配ID并添加建筑物数据
            mapData = cities.map((city, index) => {
                // 为没有建筑物数据的城市添加默认建筑物
                let buildings = city.buildings;
                if (!buildings) {
                    if (city.size === 'large') {
                        buildings = {
                            palace: true,
                            blacksmith: true,
                            market: true,
                            tavern: true,
                            stable: true,
                            inn: true,
                            post: true
                        };
                    } else if (city.size === 'medium') {
                        buildings = {
                            palace: false,
                            blacksmith: true,
                            market: true,
                            tavern: true,
                            stable: false,
                            inn: true,
                            post: true
                        };
                    } else if (city.size === 'small') {
                        buildings = {
                            palace: false,
                            blacksmith: false,
                            market: true,
                            tavern: true,
                            stable: false,
                            inn: true,
                            post: true
                        };
                    }
                }
                
                return {
                    id: index + 1,
                    name: city.name,
                    x: city.x,
                    y: city.y,
                    size: city.size,
                    isBirth: city.isBirth,
                    buildings
                };
            });

            nextId = mapData.length + 1;
            initMap();
            document.getElementById('status').textContent = '已生成60个春秋战国城市';
        }

        // 初始化
        initMap();
        generateCities();
    </script>
</body>
</html>
