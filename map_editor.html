<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>春秋战国地图编辑器</title>
    <style>
        body {
            font-family: "Microsoft YaHei", "SimSun", serif;
            background-color: #f5f0e6;
            margin: 20px;
            color: #333;
        }
        h1 {
            text-align: center;
            color: #8b4513;
            border-bottom: 2px solid #8b4513;
            padding-bottom: 10px;
        }
        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .map-section {
            flex: 1;
            min-width: 400px;
        }
        .editor-section {
            flex: 1;
            min-width: 300px;
            background-color: #fff;
            padding: 20px;
            border: 1px solid #8b4513;
            border-radius: 5px;
        }
        .map {
            display: grid;
            grid-template-columns: repeat(21, 30px);
            grid-template-rows: repeat(21, 30px);
            gap: 1px;
            background-color: #ddd;
            border: 2px solid #8b4513;
            margin: 20px 0;
        }
        .cell {
            width: 30px;
            height: 30px;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            position: relative;
        }
        .cell:hover {
            background-color: #ffebcd;
        }
        .cell.city {
            background-color: #ffe4b5;
            color: #8b4513;
        }
        .cell.city.large {
            background-color: #ff6347;
            color: white;
        }
        .cell.city.medium {
            background-color: #ffa500;
            color: white;
        }
        .cell.city.small {
            background-color: #ffd700;
            color: #8b4513;
        }
        .cell.birth {
            background-color: #ff0000;
            color: white;
        }
        .editor-section h3 {
            color: #8b4513;
            margin-top: 0;
        }
        .form-group {
            margin: 15px 0;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input[type="checkbox"] {
            margin-right: 5px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button.primary {
            background-color: #8b4513;
            color: white;
        }
        button.primary:hover {
            background-color: #a0522d;
        }
        button.secondary {
            background-color: #ddd;
            color: #333;
        }
        button.secondary:hover {
            background-color: #ccc;
        }
        .info {
            background-color: #e8f4f8;
            padding: 10px;
            border-left: 4px solid #3498db;
            margin: 10px 0;
        }
        .legend {
            margin: 20px 0;
            padding: 15px;
            background-color: #fff;
            border: 1px solid #8b4513;
            border-radius: 5px;
        }
        .legend h4 {
            margin-top: 0;
            color: #8b4513;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin: 5px 0;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            border: 1px solid #ddd;
        }
        .actions {
            margin: 20px 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>🗺️ 春秋战国地图编辑器</h1>

    <div class="info">
        <strong>操作说明：</strong><br>
        1. 点击网格上的单元格来创建或选择城市<br>
        2. 在右侧编辑城市属性<br>
        3. 点击"保存城市"按钮保存修改<br>
        4. 点击"清除城市"按钮删除城市<br>
        5. 最后点击"导出地图数据"保存所有城市数据
    </div>

    <div class="container">
        <div class="map-section">
            <h3>地图编辑区</h3>
            <div class="map" id="map"></div>
            
            <div class="legend">
                <h4>图例</h4>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #ff0000;"></div>
                    <span>主角出生点</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #ff6347;"></div>
                    <span>大型城市</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #ffa500;"></div>
                    <span>中型城市</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #ffd700;"></div>
                    <span>小型城市</span>
                </div>
            </div>

            <div class="actions">
                <button class="primary" onclick="exportData()">导出地图数据</button>
                <button class="secondary" onclick="loadData()">加载数据</button>
                <button class="secondary" onclick="clearAll()">清空地图</button>
            </div>
        </div>

        <div class="editor-section">
            <h3>城市属性编辑</h3>
            <form id="cityForm">
                <div class="form-group">
                    <label for="cityId">城市ID：</label>
                    <input type="number" id="cityId" min="1" value="1">
                </div>
                <div class="form-group">
                    <label for="cityName">城市名字：</label>
                    <input type="text" id="cityName" value="咸阳" placeholder="请输入城市名称">
                </div>
                <div class="form-group">
                    <label for="citySize">城市规模：</label>
                    <select id="citySize">
                        <option value="large">大</option>
                        <option value="medium">中</option>
                        <option value="small">小</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="isBirth" checked>
                        是主角默认出生点
                    </label>
                </div>
                <div class="button-group">
                    <button type="button" class="primary" onclick="saveCity()">保存城市</button>
                    <button type="button" class="secondary" onclick="clearCity()">清除城市</button>
                </div>
            </form>
            <div id="status" style="margin-top: 15px; color: #8b4513;"></div>
        </div>
    </div>

    <script>
        // 地图数据
        let mapData = [];
        let selectedCell = null;
        let nextId = 1;

        // 初始化地图
        function initMap() {
            const mapEl = document.getElementById('map');
            mapEl.innerHTML = '';

            for (let y = 20; y >= 0; y--) { // 从顶部开始（Y轴反转）
                for (let x = 0; x < 21; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.x = x * 10; // 每个格子代表10个单位
                    cell.dataset.y = y * 10;

                    // 检查是否有城市
                    const city = mapData.find(c => c.x === x * 10 && c.y === y * 10);
                    if (city) {
                        cell.classList.add('city');
                        cell.classList.add(city.size);
                        if (city.isBirth) {
                            cell.classList.add('birth');
                        }
                        cell.textContent = city.name.charAt(0);
                        cell.title = `${city.name} (${city.x}, ${city.y})`;
                    }

                    cell.onclick = () => selectCell(cell);
                    mapEl.appendChild(cell);
                }
            }
        }

        // 选择单元格
        function selectCell(cell) {
            selectedCell = cell;
            const x = parseInt(cell.dataset.x);
            const y = parseInt(cell.dataset.y);

            // 检查是否有城市
            const city = mapData.find(c => c.x === x && c.y === y);
            if (city) {
                document.getElementById('cityId').value = city.id;
                document.getElementById('cityName').value = city.name;
                document.getElementById('citySize').value = city.size;
                document.getElementById('isBirth').checked = city.isBirth;
            } else {
                // 新城市
                document.getElementById('cityId').value = nextId;
                document.getElementById('cityName').value = '新城市';
                document.getElementById('citySize').value = 'medium';
                document.getElementById('isBirth').checked = false;
            }

            document.getElementById('status').textContent = `已选择位置: (${x}, ${y})`;
        }

        // 保存城市
        function saveCity() {
            if (!selectedCell) {
                alert('请先选择一个位置');
                return;
            }

            const x = parseInt(selectedCell.dataset.x);
            const y = parseInt(selectedCell.dataset.y);
            const id = parseInt(document.getElementById('cityId').value);
            const name = document.getElementById('cityName').value;
            const size = document.getElementById('citySize').value;
            const isBirth = document.getElementById('isBirth').checked;

            if (!name) {
                alert('请输入城市名称');
                return;
            }

            // 检查是否已存在
            const existingIndex = mapData.findIndex(c => c.x === x && c.y === y);
            if (existingIndex >= 0) {
                mapData[existingIndex] = { id, name, x, y, size, isBirth };
            } else {
                mapData.push({ id, name, x, y, size, isBirth });
            }

            // 更新下一个ID
            nextId = Math.max(...mapData.map(c => c.id), 0) + 1;

            // 确保只有一个出生点
            if (isBirth) {
                mapData.forEach(city => {
                    if (city.x !== x || city.y !== y) {
                        city.isBirth = false;
                    }
                });
            }

            initMap();
            document.getElementById('status').textContent = `城市 ${name} 保存成功！`;
        }

        // 清除城市
        function clearCity() {
            if (!selectedCell) {
                alert('请先选择一个位置');
                return;
            }

            const x = parseInt(selectedCell.dataset.x);
            const y = parseInt(selectedCell.dataset.y);

            mapData = mapData.filter(c => c.x !== x || c.y !== y);
            initMap();
            document.getElementById('status').textContent = '城市已清除';
        }

        // 导出数据
        function exportData() {
            // 转换为游戏需要的格式
            const exportData = mapData.map(city => ({
                name: city.name,
                x: city.x,
                y: city.y,
                country: '秦', // 默认国家，可根据需要修改
                size: city.size === 'large' ? '大型' : city.size === 'medium' ? '中型' : '小型',
                speciality: '铁器', // 默认特产，可根据需要修改
                friendliness: 50 // 默认友好度，可根据需要修改
            }));

            const dataStr = JSON.stringify(exportData, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'cities.json';
            link.click();
            URL.revokeObjectURL(url);

            document.getElementById('status').textContent = '地图数据已导出';
        }

        // 加载数据
        function loadData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        try {
                            const data = JSON.parse(e.target.result);
                            mapData = data.map(city => ({
                                id: city.id || nextId++,
                                name: city.name,
                                x: city.x,
                                y: city.y,
                                size: city.size === '大型' ? 'large' : city.size === '中型' ? 'medium' : 'small',
                                isBirth: city.name === '咸阳' // 默认咸阳为出生点
                            }));
                            nextId = Math.max(...mapData.map(c => c.id), 0) + 1;
                            initMap();
                            document.getElementById('status').textContent = '地图数据已加载';
                        } catch (error) {
                            alert('数据格式错误');
                        }
                    };
                    reader.readAsText(file);
                }
            };
            input.click();
        }

        // 清空地图
        function clearAll() {
            if (confirm('确定要清空所有城市吗？')) {
                mapData = [];
                nextId = 1;
                initMap();
                document.getElementById('status').textContent = '地图已清空';
            }
        }

        // 初始化
        initMap();
    </script>
</body>
</html>
