<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>春秋战国地图编辑器</title>
    <style>
        body {
            font-family: "Microsoft YaHei", "SimSun", serif;
            background-color: #f5f0e6;
            margin: 20px;
            color: #333;
        }
        h1 {
            text-align: center;
            color: #8b4513;
            border-bottom: 2px solid #8b4513;
            padding-bottom: 10px;
        }
        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .map-section {
            flex: 2;
            min-width: 600px;
        }
        .editor-section {
            flex: 1;
            min-width: 300px;
            background-color: #fff;
            padding: 20px;
            border: 1px solid #8b4513;
            border-radius: 5px;
        }
        .map {
            display: grid;
            grid-template-columns: repeat(100, 20px);
            grid-template-rows: repeat(100, 20px);
            gap: 1px;
            background-color: #ddd;
            border: 2px solid #8b4513;
            margin: 20px 0;
            overflow: auto;
            max-height: 950px;
            max-width: 100%;
        }
        .map-section {
            flex: 2;
            min-width: 600px;
        }
        .cell {
            width: 20px;
            height: 20px;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            position: relative;
        }
        .cell:hover {
            background-color: #ffebcd;
        }
        .cell.city {
            background-color: #ffe4b5;
            color: #8b4513;
        }
        .cell.city.large {
            background-color: #ff6347;
            color: white;
        }
        .cell.city.medium {
            background-color: #ffa500;
            color: white;
        }
        .cell.city.small {
            background-color: #ffd700;
            color: #8b4513;
        }
        .cell.birth {
            background-color: #000000;
            color: white;
        }
        
        .cell.event-point {
            background-color: #ffeeee;
            border: 2px solid #ff6666;
            font-weight: bold;
            color: #ff3333;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .editor-section h3 {
            color: #8b4513;
            margin-top: 0;
        }
        .form-group {
            margin: 15px 0;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input[type="checkbox"] {
            margin-right: 5px;
        }
        .buildings-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 5px;
        }
        .buildings-list label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: normal;
            margin: 0;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button.primary {
            background-color: #8b4513;
            color: white;
        }
        button.primary:hover {
            background-color: #a0522d;
        }
        button.secondary {
            background-color: #ddd;
            color: #333;
        }
        button.secondary:hover {
            background-color: #ccc;
        }
        .info {
            background-color: #e8f4f8;
            padding: 10px;
            border-left: 4px solid #3498db;
            margin: 10px 0;
        }
        .legend {
            margin: 20px 0;
            padding: 15px;
            background-color: #fff;
            border: 1px solid #8b4513;
            border-radius: 5px;
        }
        .legend h4 {
            margin-top: 0;
            color: #8b4513;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin: 5px 0;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            border: 1px solid #ddd;
        }
        .actions {
            margin: 20px 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>🗺️ 春秋战国地图编辑器</h1>

    <div class="info">
        <strong>操作说明：</strong><br>
        1. 点击网格上的单元格来创建或选择城市<br>
        2. 在右侧编辑城市属性<br>
        3. 点击"保存城市"按钮保存修改<br>
        4. 点击"清除城市"按钮删除城市<br>
        5. 最后点击"导出地图数据"保存所有城市数据
    </div>

    <div class="container">
        <div class="map-section">
            <h3>地图编辑区</h3>
            <div class="map" id="map"></div>
            
            <div class="legend">
                <h4>图例</h4>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #000000;"></div>
                    <span>主角出生点</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #ff6347;"></div>
                    <span>大型城市</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #ffa500;"></div>
                    <span>中型城市</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background-color: #ffd700;"></div>
                    <span>小型城市</span>
                </div>
            </div>

            <div class="actions">
                <button class="primary" onclick="exportData()">导出地图数据</button>
                <button class="secondary" onclick="loadData()">加载数据</button>
                <button class="secondary" onclick="clearAll()">清空地图</button>
            </div>
        </div>

        <div class="editor-section">
            <h3>编辑操作</h3>
            
            <!-- 添加类型选择 -->
            <div id="addTypeSection">
                <h4>添加新元素</h4>
                <div class="form-group">
                    <label>选择添加类型：</label>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <button type="button" class="primary" onclick="showCityForm()">添加城市</button>
                        <button type="button" class="primary" onclick="showEventForm()">添加事件点</button>
                    </div>
                </div>
            </div>
            
            <!-- 城市编辑表单 -->
            <div id="cityEditSection" style="display: none;">
                <h4>城市属性编辑</h4>
                <form id="cityForm">
                    <div class="form-group">
                        <label for="cityId">城市ID：</label>
                        <input type="number" id="cityId" min="1" value="1">
                    </div>
                    <div class="form-group">
                        <label for="cityName">城市名字：</label>
                        <input type="text" id="cityName" value="新城市" placeholder="请输入城市名称">
                    </div>
                    <div class="form-group">
                        <label for="citySize">城市规模：</label>
                        <select id="citySize">
                            <option value="large">大</option>
                            <option value="medium">中</option>
                            <option value="small">小</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="isBirth">
                            是主角默认出生点
                        </label>
                    </div>
                    <div class="form-group">
                        <label>建筑物：</label>
                        <div class="buildings-list">
                            <label><input type="checkbox" id="building-palace"> 行宫</label>
                            <label><input type="checkbox" id="building-blacksmith"> 铁铺</label>
                            <label><input type="checkbox" id="building-market"> 市集</label>
                            <label><input type="checkbox" id="building-tavern"> 酒馆</label>
                            <label><input type="checkbox" id="building-stable"> 马厮</label>
                            <label><input type="checkbox" id="building-inn"> 民宿</label>
                            <label><input type="checkbox" id="building-post"> 驿站</label>
                        </div>
                    </div>

                    <div class="button-group">
                        <button type="button" class="primary" onclick="saveCity()">保存城市</button>
                        <button type="button" class="secondary" onclick="clearCity()">删除城市</button>
                        <button type="button" class="secondary" onclick="cancelEdit()">取消</button>
                    </div>
                </form>
            </div>
            
            <!-- 事件点编辑表单 -->
            <div id="eventEditSection" style="display: none;">
                <h4>事件点编辑</h4>
                <form id="eventForm">
                    <div class="form-group">
                        <label for="eventPointId">事件点ID：</label>
                        <input type="number" id="eventPointId" min="1" value="1">
                    </div>
                    <div class="form-group">
                        <label for="eventPointEventId">事件ID：</label>
                        <input type="number" id="eventPointEventId" min="0" value="0" placeholder="输入事件ID">
                    </div>
                    <div class="button-group">
                        <button type="button" class="primary" onclick="saveEventPoint()">保存事件点</button>
                        <button type="button" class="secondary" onclick="clearEventPoint()">删除事件点</button>
                        <button type="button" class="secondary" onclick="cancelEdit()">取消</button>
                    </div>
                </form>
            </div>
            
            <div id="status" style="margin-top: 15px; color: #8b4513;"></div>
        </div>
    </div>

    <script>
        // 事件配置数据
        let eventsConfig = [];
        
        // 加载事件配置
        async function loadEventsConfig() {
            try {
                const response = await fetch('csv/events_config.csv');
                const text = await response.text();
                const lines = text.split('\n');
                
                // 跳过第一行注释和第二行字段名
                for (let i = 2; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (line) {
                        const parts = line.split(',');
                        if (parts.length >= 6) {
                            eventsConfig.push({
                                id: parseInt(parts[0]),
                                eventType: parseInt(parts[1]),
                                param: parts[2],
                                weight: parseInt(parts[3]),
                                eventName: parts[4],
                                eventDescription: parts[5],
                                eventImage: parts[6] || ''
                            });
                        }
                    }
                }
                

                

            } catch (error) {
                console.error('加载事件配置失败:', error);
            }
        }
        
        // 地图数据
        let mapData = [];
        let eventPoints = [];
        let selectedCell = null;
        let nextCityId = 1;
        let nextEventPointId = 1;

        // 地图格子与里之间的转换
        // 咸阳(0,0)在地图中心(50,50)，1格子=10里
        function liToGrid(liX, liY) {
            return {
                x: Math.round((liX / 10) + 50),
                y: Math.round(50 - (liY / 10))
            };
        }
        
        function gridToLi(gridX, gridY) {
            return {
                x: (gridX - 50) * 10,
                y: (50 - gridY) * 10
            };
        }

        // 初始化地图
        function initMap() {
            const mapEl = document.getElementById('map');
            mapEl.innerHTML = '';

            for (let y = 99; y >= 0; y--) { // 从顶部开始（Y轴反转）
                for (let x = 0; x < 100; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.x = x;
                    cell.dataset.y = y;

                    // 检查是否有城市（将格子坐标转换为里坐标进行比较）
                    const liCoords = gridToLi(x, y);
                    const city = mapData.find(c => c.x === liCoords.x && c.y === liCoords.y);
                    if (city) {
                        cell.classList.add('city');
                        cell.classList.add(city.size);
                        if (city.isBirth) {
                            cell.classList.add('birth');
                        }
                        cell.textContent = city.name.charAt(0);
                        cell.title = `${city.name} (${city.x}, ${city.y})里`;
                    } else {
                        // 检查是否有事件点
                        const eventPoint = eventPoints.find(ep => ep.x === liCoords.x && ep.y === liCoords.y);
                        if (eventPoint) {
                            cell.classList.add('event-point');
                            cell.textContent = '!';
                            cell.title = `事件点 (${eventPoint.x}, ${eventPoint.y})里`;
                        }
                    }

                    cell.onclick = () => selectCell(cell);
                    mapEl.appendChild(cell);
                }
            }
        }

        // 显示城市编辑表单
        function showCityForm() {
            if (!selectedCell) {
                alert('请先选择一个位置');
                return;
            }
            
            const gridX = parseInt(selectedCell.dataset.x);
            const gridY = parseInt(selectedCell.dataset.y);
            const liCoords = gridToLi(gridX, gridY);
            
            // 检查是否已存在事件点
            const eventPointExists = eventPoints.some(ep => ep.x === liCoords.x && ep.y === liCoords.y);
            if (eventPointExists) {
                alert('该位置已存在事件点，不能添加城市');
                return;
            }
            
            // 检查是否已存在城市
            const city = mapData.find(c => c.x === liCoords.x && c.y === liCoords.y);
            
            document.getElementById('addTypeSection').style.display = 'none';
            document.getElementById('cityEditSection').style.display = 'block';
            document.getElementById('eventEditSection').style.display = 'none';
            
            if (city) {
                // 编辑现有城市
                document.getElementById('cityId').value = city.id;
                document.getElementById('cityName').value = city.name;
                document.getElementById('citySize').value = city.size;
                document.getElementById('isBirth').checked = city.isBirth;
                
                // 设置建筑物
                setBuildingsByCitySize(city.size, city.buildings);
            } else {
                // 新城市
                document.getElementById('cityId').value = nextCityId;
                document.getElementById('cityName').value = '新城市';
                document.getElementById('citySize').value = 'medium';
                document.getElementById('isBirth').checked = false;
                
                // 设置默认建筑物
                setBuildingsByCitySize('medium');
            }
        }

        // 显示事件点编辑表单
        function showEventForm() {
            if (!selectedCell) {
                alert('请先选择一个位置');
                return;
            }
            
            const gridX = parseInt(selectedCell.dataset.x);
            const gridY = parseInt(selectedCell.dataset.y);
            const liCoords = gridToLi(gridX, gridY);
            
            // 检查是否已存在城市
            const cityExists = mapData.some(c => c.x === liCoords.x && c.y === liCoords.y);
            if (cityExists) {
                alert('该位置已存在城市，不能添加事件点');
                return;
            }
            
            // 检查是否已存在事件点
            const eventPoint = eventPoints.find(ep => ep.x === liCoords.x && ep.y === liCoords.y);
            
            document.getElementById('addTypeSection').style.display = 'none';
            document.getElementById('cityEditSection').style.display = 'none';
            document.getElementById('eventEditSection').style.display = 'block';
            
            if (eventPoint) {
                // 编辑现有事件点
                document.getElementById('eventPointId').value = eventPoint.id;
                document.getElementById('eventPointEventId').value = eventPoint.eventId || 0;
            } else {
                // 新事件点
                document.getElementById('eventPointId').value = nextEventPointId;
                document.getElementById('eventPointEventId').value = 0;
            }
        }

        // 取消编辑
        function cancelEdit() {
            document.getElementById('addTypeSection').style.display = 'block';
            document.getElementById('cityEditSection').style.display = 'none';
            document.getElementById('eventEditSection').style.display = 'none';
        }



        // 选择单元格
        function selectCell(cell) {
            selectedCell = cell;
            const gridX = parseInt(cell.dataset.x);
            const gridY = parseInt(cell.dataset.y);
            const liCoords = gridToLi(gridX, gridY);

            // 检查是否有城市
            const city = mapData.find(c => c.x === liCoords.x && c.y === liCoords.y);
            // 检查是否有事件点
            const eventPoint = eventPoints.find(ep => ep.x === liCoords.x && ep.y === liCoords.y);

            if (city) {
                // 显示城市编辑表单
                showCityForm();
            } else if (eventPoint) {
                // 显示事件点编辑表单
                showEventForm();
            } else {
                // 新位置，显示添加类型选择
                document.getElementById('addTypeSection').style.display = 'block';
                document.getElementById('cityEditSection').style.display = 'none';
                document.getElementById('eventEditSection').style.display = 'none';
            }

            document.getElementById('status').textContent = `已选择位置: (${liCoords.x}, ${liCoords.y})里`;
        }
        
        // 根据城市大小设置建筑物
        function setBuildingsByCitySize(size, existingBuildings = null) {
            // 大城市：所有建筑物
            if (size === 'large') {
                document.getElementById('building-palace').checked = existingBuildings ? existingBuildings.palace : true;
                document.getElementById('building-blacksmith').checked = existingBuildings ? existingBuildings.blacksmith : true;
                document.getElementById('building-market').checked = existingBuildings ? existingBuildings.market : true;
                document.getElementById('building-tavern').checked = existingBuildings ? existingBuildings.tavern : true;
                document.getElementById('building-stable').checked = existingBuildings ? existingBuildings.stable : true;
                document.getElementById('building-inn').checked = existingBuildings ? existingBuildings.inn : true;
                document.getElementById('building-post').checked = existingBuildings ? existingBuildings.post : true;
            }
            // 中型城市：没有行宫，马厮
            else if (size === 'medium') {
                document.getElementById('building-palace').checked = existingBuildings ? existingBuildings.palace : false;
                document.getElementById('building-blacksmith').checked = existingBuildings ? existingBuildings.blacksmith : true;
                document.getElementById('building-market').checked = existingBuildings ? existingBuildings.market : true;
                document.getElementById('building-tavern').checked = existingBuildings ? existingBuildings.tavern : true;
                document.getElementById('building-stable').checked = existingBuildings ? existingBuildings.stable : false;
                document.getElementById('building-inn').checked = existingBuildings ? existingBuildings.inn : true;
                document.getElementById('building-post').checked = existingBuildings ? existingBuildings.post : true;
            }
            // 小型城市：只有市集，民宿，酒馆和驿站
            else if (size === 'small') {
                document.getElementById('building-palace').checked = existingBuildings ? existingBuildings.palace : false;
                document.getElementById('building-blacksmith').checked = existingBuildings ? existingBuildings.blacksmith : false;
                document.getElementById('building-market').checked = existingBuildings ? existingBuildings.market : true;
                document.getElementById('building-tavern').checked = existingBuildings ? existingBuildings.tavern : true;
                document.getElementById('building-stable').checked = existingBuildings ? existingBuildings.stable : false;
                document.getElementById('building-inn').checked = existingBuildings ? existingBuildings.inn : true;
                document.getElementById('building-post').checked = existingBuildings ? existingBuildings.post : true;
            }
        }

        // 保存城市
        function saveCity() {
            if (!selectedCell) {
                alert('请先选择一个位置');
                return;
            }

            const gridX = parseInt(selectedCell.dataset.x);
            const gridY = parseInt(selectedCell.dataset.y);
            const liCoords = gridToLi(gridX, gridY);
            const id = parseInt(document.getElementById('cityId').value);
            const name = document.getElementById('cityName').value;
            const size = document.getElementById('citySize').value;
            const isBirth = document.getElementById('isBirth').checked;
            
            // 获取建筑物设置
            const buildings = {
                palace: document.getElementById('building-palace').checked,
                blacksmith: document.getElementById('building-blacksmith').checked,
                market: document.getElementById('building-market').checked,
                tavern: document.getElementById('building-tavern').checked,
                stable: document.getElementById('building-stable').checked,
                inn: document.getElementById('building-inn').checked,
                post: document.getElementById('building-post').checked
            };

            if (!name) {
                alert('请输入城市名称');
                return;
            }

            // 检查是否已存在
            const existingIndex = mapData.findIndex(c => c.x === liCoords.x && c.y === liCoords.y);
            if (existingIndex >= 0) {
                mapData[existingIndex] = { id, name, x: liCoords.x, y: liCoords.y, size, isBirth, buildings };
            } else {
                mapData.push({ id, name, x: liCoords.x, y: liCoords.y, size, isBirth, buildings });
            }

            // 更新下一个城市ID
            nextCityId = Math.max(...mapData.map(c => c.id), 0) + 1;

            // 确保只有一个出生点
            if (isBirth) {
                mapData.forEach(city => {
                    if (city.x !== liCoords.x || city.y !== liCoords.y) {
                        city.isBirth = false;
                    }
                });
            }

            initMap();
            document.getElementById('status').textContent = `城市 ${name} 保存成功！`;
        }

        // 清除城市
        function clearCity() {
            if (!selectedCell) {
                alert('请先选择一个位置');
                return;
            }

            const gridX = parseInt(selectedCell.dataset.x);
            const gridY = parseInt(selectedCell.dataset.y);
            const liCoords = gridToLi(gridX, gridY);

            mapData = mapData.filter(c => c.x !== liCoords.x || c.y !== liCoords.y);
            initMap();
            document.getElementById('status').textContent = '城市已清除';
        }

        // 保存事件点
        function saveEventPoint() {
            if (!selectedCell) {
                alert('请先选择一个位置');
                return;
            }

            const gridX = parseInt(selectedCell.dataset.x);
            const gridY = parseInt(selectedCell.dataset.y);
            const liCoords = gridToLi(gridX, gridY);
            const id = parseInt(document.getElementById('eventPointId').value);
            const eventId = parseInt(document.getElementById('eventPointEventId').value) || 0;

            // 检查是否已存在城市
            const cityExists = mapData.some(c => c.x === liCoords.x && c.y === liCoords.y);
            if (cityExists) {
                alert('该位置已存在城市，不能添加事件点');
                return;
            }

            // 检查是否已存在
            const existingIndex = eventPoints.findIndex(ep => ep.x === liCoords.x && ep.y === liCoords.y);
            if (existingIndex >= 0) {
                eventPoints[existingIndex] = { id, x: liCoords.x, y: liCoords.y, eventId };
            } else {
                eventPoints.push({ id, x: liCoords.x, y: liCoords.y, eventId });
            }

            // 更新下一个事件点ID
            nextEventPointId = Math.max(...eventPoints.map(ep => ep.id), 0) + 1;

            initMap();
            document.getElementById('status').textContent = '事件点已保存';
        }

        // 清除事件点
        function clearEventPoint() {
            if (!selectedCell) {
                alert('请先选择一个位置');
                return;
            }

            const gridX = parseInt(selectedCell.dataset.x);
            const gridY = parseInt(selectedCell.dataset.y);
            const liCoords = gridToLi(gridX, gridY);

            // 从事件点数据中移除
            eventPoints = eventPoints.filter(ep => ep.x !== liCoords.x || ep.y !== liCoords.y);
            initMap();
            document.getElementById('status').textContent = '事件点已清除';
        }

        // 导出数据
        function exportData() {
            // 转换为游戏需要的格式
            const exportData = {
                cities: mapData.map(city => ({
                    name: city.name,
                    x: city.x,
                    y: city.y,
                    country: '秦', // 默认国家，可根据需要修改
                    size: city.size === 'large' ? '大型' : city.size === 'medium' ? '中型' : '小型',
                    speciality: '铁器', // 默认特产，可根据需要修改
                    friendliness: 50, // 默认友好度，可根据需要修改
                    isBirth: city.isBirth // 是否为初始点
                })),
                eventPoints: eventPoints.map(ep => ({
                    id: ep.id,
                    x: ep.x,
                    y: ep.y,
                    eventId: ep.eventId || 0
                }))
            };

            const dataStr = JSON.stringify(exportData, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'map_data.json';
            link.click();
            URL.revokeObjectURL(url);

            document.getElementById('status').textContent = '地图数据已导出';
        }

        // 加载数据
        function loadData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        try {
                            const data = JSON.parse(e.target.result);
                            
                            // 加载城市数据
                            if (data.cities) {
                                mapData = data.cities.map(city => ({
                                    id: city.id || nextCityId++,
                                    name: city.name,
                                    x: city.x,
                                    y: city.y,
                                    size: city.size === '大型' ? 'large' : city.size === '中型' ? 'medium' : 'small',
                                    isBirth: city.isBirth !== undefined ? city.isBirth : city.name === '咸阳' // 如果有isBirth字段，使用该值，否则默认咸阳为出生点
                                }));
                                nextCityId = Math.max(...mapData.map(c => c.id), 0) + 1;
                            } else if (Array.isArray(data)) {
                                // 兼容旧格式
                                mapData = data.map(city => ({
                                    id: city.id || nextCityId++,
                                    name: city.name,
                                    x: city.x,
                                    y: city.y,
                                    size: city.size === '大型' ? 'large' : city.size === '中型' ? 'medium' : 'small',
                                    isBirth: city.isBirth !== undefined ? city.isBirth : city.name === '咸阳' // 如果有isBirth字段，使用该值，否则默认咸阳为出生点
                                }));
                                nextCityId = Math.max(...mapData.map(c => c.id), 0) + 1;
                            }
                            
                            // 加载事件点数据
                            if (data.eventPoints) {
                                eventPoints = data.eventPoints.map(ep => ({
                                    id: ep.id || nextEventPointId++,
                                    x: ep.x,
                                    y: ep.y,
                                    eventId: ep.eventId || 0
                                }));
                                nextEventPointId = Math.max(...eventPoints.map(ep => ep.id), 0) + 1;
                            }
                            
                            initMap();
                            document.getElementById('status').textContent = '地图数据已加载';
                        } catch (error) {
                            alert('数据格式错误');
                        }
                    };
                    reader.readAsText(file);
                }
            };
            input.click();
        }

        // 清空地图
        function clearAll() {
            if (confirm('确定要清空所有城市和事件点吗？')) {
                mapData = [];
                eventPoints = [];
                nextCityId = 1;
                nextEventPointId = 1;
                initMap();
                document.getElementById('status').textContent = '地图已清空';
            }
        }

        // 生成春秋战国城市数据
        function generateCities() {
            // 城市列表（坐标以咸阳为原点(0,0)，单位：里）
            // 1个格子 = 10里 = 5公里
            const cities = [
                // 咸阳（中心城市）
                { name: '咸阳', x: 0, y: 0, size: 'large', isBirth: false },
                // 初始城市：咸阳西30里，南30里
                { name: '始源村', x: -30, y: 30, size: 'small', isBirth: true }
            ];

            // 为每个城市分配ID并添加建筑物数据
            mapData = cities.map((city, index) => {
                // 为没有建筑物数据的城市添加默认建筑物
                let buildings = city.buildings;
                if (!buildings) {
                    if (city.size === 'large') {
                        buildings = {
                            palace: true,
                            blacksmith: true,
                            market: true,
                            tavern: true,
                            stable: true,
                            inn: true,
                            post: true
                        };
                    } else if (city.size === 'medium') {
                        buildings = {
                            palace: false,
                            blacksmith: true,
                            market: true,
                            tavern: true,
                            stable: false,
                            inn: true,
                            post: true
                        };
                    } else if (city.size === 'small') {
                        buildings = {
                            palace: false,
                            blacksmith: false,
                            market: true,
                            tavern: true,
                            stable: false,
                            inn: true,
                            post: true
                        };
                    }
                }
                
                return {
                    id: index + 1,
                    name: city.name,
                    x: city.x,
                    y: city.y,
                    size: city.size,
                    isBirth: city.isBirth,
                    buildings
                };
            });

            nextId = mapData.length + 1;
            initMap();
            document.getElementById('status').textContent = '已生成60个春秋战国城市';
        }

        // 异步加载地图数据
        async function loadMapDataFromFile() {
            try {
                // 首先尝试加载map/map_data.json
                let response = await fetch('map/map_data.json');
                
                // 如果失败，尝试加载根目录的map_data.json
                if (!response.ok) {
                    response = await fetch('map_data.json');
                }
                if (response.ok) {
                    const data = await response.json();
                    
                    // 加载城市数据
                    if (data.cities && data.cities.length > 0) {
                        mapData = data.cities.map(city => ({
                            id: city.id || nextCityId++,
                            name: city.name,
                            x: city.x,
                            y: city.y,
                            size: city.size === '大型' ? 'large' : city.size === '中型' ? 'medium' : 'small',
                            isBirth: city.isBirth !== undefined ? city.isBirth : city.name === '咸阳',
                            buildings: city.buildings
                        }));
                        nextCityId = Math.max(...mapData.map(c => c.id), 0) + 1;
                    }
                    
                    // 加载事件点数据
                    if (data.eventPoints && data.eventPoints.length > 0) {
                        eventPoints = data.eventPoints.map(ep => ({
                            id: ep.id || nextEventPointId++,
                            x: ep.x,
                            y: ep.y,
                            eventId: ep.eventId || 0
                        }));
                        nextEventPointId = Math.max(...eventPoints.map(ep => ep.id), 0) + 1;
                    }
                    
                    return true;
                } else {
                    console.log('map/map_data.json文件不存在，使用默认数据');
                    return false;
                }
            } catch (error) {
                console.log('加载map/map_data.json失败，使用默认数据:', error);
                return false;
            }
        }
        
        // 初始化
        async function init() {
            initMap();
            loadEventsConfig();
            
            // 尝试加载map/map_data.json文件
            const loaded = await loadMapDataFromFile();
            
            // 如果没有加载到数据，使用默认数据
            if (!loaded || mapData.length === 0) {
                generateCities();
            }
            
            initMap();
            if (loaded && mapData.length > 0) {
                document.getElementById('status').textContent = '已加载地图数据';
            }
        }
        
        // 启动初始化
        init();
    </script>
</body>
</html>
