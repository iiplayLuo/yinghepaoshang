    <style>
        body {
            font-family: "Microsoft YaHei", "SimSun", serif;
            background-color: #f5f0e6;
            margin: 20px;
            color: #333;
        }
        h1 {
            text-align: center;
            color: #8b4513;
            border-bottom: 2px solid #8b4513;
            padding-bottom: 10px;
        }
        .map-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .map {
            border: 2px solid #8b4513;
            background-color: #fff;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(21, 30px);
            grid-template-rows: repeat(21, 25px);
            gap: 0;
        }
        .cell {
            width: 30px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            border: 1px solid #ddd;
            position: relative;
        }
        .cell.city {
            background-color: #ffe4b5;
            font-weight: bold;
            color: #8b4513;
            cursor: pointer;
        }
        .cell.city:hover {
            background-color: #ffa500;
        }
        .cell.capital {
            background-color: #ff6347;
            color: white;
        }
        .cell.xianyang {
            background-color: #ff0000;
            color: white;
            font-weight: bold;
        }
        .legend {
            margin: 20px auto;
            padding: 15px;
            border: 1px solid #8b4513;
            background-color: #fff;
            max-width: 600px;
        }
        .legend h3 {
            margin-top: 0;
            color: #8b4513;
        }
        .legend-item {
            display: inline-block;
            margin: 5px 15px 5px 0;
        }
        .city-list {
            margin: 20px auto;
            padding: 15px;
            border: 1px solid #8b4513;
            background-color: #fff;
            max-width: 800px;
        }
        .city-list h3 {
            margin-top: 0;
            color: #8b4513;
        }
        .city-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }
        .city-card {
            padding: 8px;
            border: 1px solid #ddd;
            background-color: #f9f9f9;
            border-radius: 4px;
        }
        .city-card:hover {
            background-color: #ffe4b5;
        }
        .city-name {
            font-weight: bold;
            color: #8b4513;
        }
        .city-info {
            font-size: 12px;
            color: #666;
        }
        .stats {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background-color: #fff;
            border: 1px solid #8b4513;
            max-width: 600px;
            margin: 20px auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #8b4513;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .country-qin { color: #8b4513; }
        .country-chu { color: #2e8b57; }
        .country-qi { color: #4169e1; }
        .country-zhao { color: #dc143c; }
        .country-wei { color: #ff8c00; }
        .country-yan { color: #6b8e23; }
        .country-han { color: #9932cc; }
    </style>

        // 渲染地图
        function renderMap() {
            const mapEl = document.getElementById('map');
            const gridSize = 21; // 10x10的网格，每个格子代表20单位坐标
            const cellSize = 20; // 每个格子代表20单位坐标

            // 创建网格
            for (let row = 0; row < gridSize; row++) {
                for (let col = 0; col < gridSize; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';

                    // 计算这个格子代表的坐标范围
                    const xStart = col * cellSize;
                    const xEnd = xStart + cellSize;
                    const yStart = (gridSize - 1 - row) * cellSize; // Y轴翻转
                    const yEnd = yStart + cellSize;

                    // 查找在这个范围内的城市
                    const citiesInCell = cities.filter(city =>
                        city.x >= xStart && city.x < xEnd &&
                        city.y >= yStart && city.y < yEnd
                    );

                    if (citiesInCell.length > 0) {
                        if (citiesInCell.length === 1) {
                            const city = citiesInCell[0];
                            cell.textContent = city.name;
                            cell.classList.add('city');
                            if (city.name === '咸阳') {
                                cell.classList.add('xianyang');
                            } else if (city.size === '大型') {
                                cell.classList.add('capital');
                            }
                            cell.title = `${city.name} (${city.x}, ${city.y}) - ${city.country}国`;
                        } else {
                            cell.textContent = '+';
                            cell.classList.add('city');
                            cell.title = `${citiesInCell.length}个城市重叠`;
                        }
                    }

                    mapEl.appendChild(cell);
                }
            }
        }

        // 渲染城市列表
        function renderCityList() {
            const gridEl = document.getElementById('city-grid');

            // 按国家分组
            const countries = {};
            cities.forEach(city => {
                if (!countries[city.country]) {
                    countries[city.country] = [];
                }
                countries[city.country].push(city);
            });

            // 渲染每个国家的城市
            Object.keys(countries).sort().forEach(country => {
                const countryDiv = document.createElement('div');
                countryDiv.style.gridColumn = '1 / -1';
                countryDiv.style.fontWeight = 'bold';
                countryDiv.style.color = '#8b4513';
                countryDiv.style.marginTop = '10px';
                countryDiv.textContent = `${country}国 (${countries[country].length}个城市)`;
                gridEl.appendChild(countryDiv);

                countries[country].forEach(city => {
                    const card = document.createElement('div');
                    card.className = 'city-card';

                    const distance = Math.sqrt(
                        Math.pow(city.x - 100, 2) + Math.pow(city.y - 100, 2)
                    ).toFixed(1);

                    card.innerHTML = `
                        <div class="city-name">${city.name}</div>
                        <div class="city-info">
                            坐标: (${city.x}, ${city.y}) - 距咸阳: ${distance}<br>
                            规模: ${city.size} - 特产: ${city.speciality}<br>
                            友好度: ${city.friendliness}
                        </div>
                    `;
                    gridEl.appendChild(card);
                });
            });
        }

        // 更新统计信息
        function updateStats() {
            document.getElementById('total-cities').textContent = cities.length;
        }

        // 初始化
        renderMap();
        renderCityList();
        updateStats();
